<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>address and abbr</title>
</head>
<body>

<!--Adress tag uses-->

  <address>Location: Dhaka-1207, Bangladesh</address>
<br>

  <!--Abbreviation tag uses-->

  <p>He lives in <abbr title="Bangladesh">BD</abbr></p>

</body>
</html>
